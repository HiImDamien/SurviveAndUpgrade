name: Validate and Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Install Aftman + Rojo ───────────────────────────────────────────
      # Uses aftman.toml in the repo to install Rojo — same as local setup.
      - name: Install Aftman
        uses: ok-nick/setup-aftman@v0.4.2

      - name: Install Rojo via Aftman
        run: aftman install --no-trust-check

      # ── 3. Install Selene (Luau linter) ────────────────────────────────────
      - name: Install Selene
        run: |
          SELENE_VERSION=$(curl -s https://api.github.com/repos/Kampfkarren/selene/releases/latest | grep '"tag_name"' | cut -d '"' -f 4)
          curl -sL "https://github.com/Kampfkarren/selene/releases/download/${SELENE_VERSION}/selene-${SELENE_VERSION}-linux.zip" -o selene.zip
          unzip -q selene.zip selene
          chmod +x selene
          sudo mv selene /usr/local/bin/selene

      # ── 4. Lint ────────────────────────────────────────────────────────────
      # Selene exits with code 1 for warnings AND errors — we only want to
      # fail the build on actual errors (error[...]), not style warnings.
      - name: Lint with Selene
        run: |
          OUTPUT=$(selene Server/ Client/ Shared/ 2>&1) || true
          echo "$OUTPUT"
          if echo "$OUTPUT" | grep -q "^error\["; then
            echo "Selene found errors — fix them before deploying."
            exit 1
          fi

      # ── 5. Build ───────────────────────────────────────────────────────────
      # Produces game.rbxl — if the project.json or file tree is broken this fails fast.
      - name: Build with Rojo
        run: rojo build default.project.json --output game.rbxl

      # ── 6. Deploy (main branch only) ───────────────────────────────────────
      # Pushes the built place file to Roblox via Open Cloud API.
      # Requires three repository secrets:
      #   ROBLOX_API_KEY     — Open Cloud key with universe.place:write scope
      #   ROBLOX_UNIVERSE_ID — found in Creator Hub > game settings
      #   ROBLOX_PLACE_ID    — the start place ID (shown in the URL in Studio)
      - name: Deploy to Roblox
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          MAX_ATTEMPTS=5
          DELAY=15

          for ATTEMPT in $(seq 1 $MAX_ATTEMPTS); do
            echo "Deploy attempt $ATTEMPT of $MAX_ATTEMPTS..."

            HTTP_STATUS=$(curl -s -o response.json -w "%{http_code}" \
              -X POST \
              "https://apis.roblox.com/universes/v1/${{ secrets.ROBLOX_UNIVERSE_ID }}/places/${{ secrets.ROBLOX_PLACE_ID }}/versions?versionType=Published" \
              -H "x-api-key: ${{ secrets.ROBLOX_API_KEY }}" \
              -H "Content-Type: application/octet-stream" \
              --data-binary @game.rbxl)

            echo "Response: $(cat response.json)"

            if [ "$HTTP_STATUS" -eq 200 ]; then
              echo "Deploy succeeded!"
              exit 0
            fi

            echo "Got HTTP $HTTP_STATUS — waiting ${DELAY}s before retry..."
            sleep $DELAY
          done

          echo "Deploy failed after $MAX_ATTEMPTS attempts."
          exit 1
