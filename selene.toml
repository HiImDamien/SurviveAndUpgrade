# Selene Luau linter configuration
# https://kampfkarren.github.io/selene/

std = "roblox"

[rules]
# Style warnings — don't block the build, just inform
multiple_statements = "warn"
unused_variable = "warn"
deprecated = "warn"
global_usage = "warn"
empty_if = "warn"
roblox_manual_fromscale_or_fromoffset = "warn"
